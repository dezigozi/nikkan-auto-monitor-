name: 日刊自動車新聞 毎日取得

on:
  schedule:
    # 毎朝7:00 JST = UTC 22:00（前日）
    - cron: '0 22 * * 0-4'
  workflow_dispatch:   # 手動実行ボタンも有効化

jobs:
  scrape-and-summarize:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: スクレイピング・要約・Slack投稿
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETDENJD_USERNAME: ${{ secrets.NETDENJD_USERNAME }}
          NETDENJD_PASSWORD: ${{ secrets.NETDENJD_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scraper.py

      - name: articles.json をコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "📰 $(date +'%Y-%m-%d') 記事更新"
          git push
